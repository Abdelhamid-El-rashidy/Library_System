<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Add New Book</title>
</head>

<body>
  <header>
    <nav>
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Books</a></li>
        <li><a href="admin-add-book.html"><strong>Add Book</strong></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Add New Book</h1>

    <form action="#" method="post">
      <fieldset>
        <legend>Book Details</legend>

        <p>
          <label for="title">Title <em>(required)</em></label><br>
          <input type="text" id="title" name="title" required>
        </p>

        <p>
          <label for="author">Author <em>(required)</em></label><br>
          <input type="text" id="author" name="author" required>
        </p>

        <p>
          <label for="isbn">ISBN <em>(required)</em></label><br>
          <input type="text" id="isbn" name="isbn" required>
        </p>

        <p>
          <label for="publisher">Publisher</label><br>
          <input type="text" id="publisher" name="publisher">
        </p>

        <p>
          <label for="publication_year">Publication Year</label><br>
          <input type="number" id="publication_year" name="publication_year" min="1000" max="2099">
        </p>
      </fieldset>


      <fieldset>
        <legend>Additional Information</legend>

        <p>
          <label for="category">Category / Genre</label><br>
          <select id="category" name="category">
            <option value="">-- Select --</option>
            <option value="fiction">Fiction</option>
            <option value="non-fiction">Non-Fiction</option>
            <option value="science">Science</option>
            <option value="history">History</option>
            <option value="technology">Technology</option>
            <option value="philosophy">Philosophy</option>
            <option value="biography">Biography</option>
            <option value="other">Other</option>
          </select>
        </p>

        <p>
          <label for="language">Language</label><br>
          <select id="language" name="language">
            <option value="english">English</option>
            <option value="arabic">Arabic</option>
            <option value="french">French</option>
            <option value="other">Other</option>
          </select>
        </p>

        <p>
          <label for="pages">Number of Pages</label><br>
          <input type="number" id="pages" name="pages" min="1">
        </p>

        <p>
          <label for="copies">Number of Copies <em>(required)</em></label><br>
          <input type="number" id="copies" name="copies" min="1" required>
        </p>
      </fieldset>

      <p>
        <button type="submit">Add Book</button>
        <button type="reset">Clear Form</button>
      </p>
    </form>
  </main>

</body>

</html>
