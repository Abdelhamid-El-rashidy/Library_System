<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Book Management</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
        <nav class="nav-island">
            <a href="catalog.html" class="nav-item">Books</a>
            <a href="book-edit.html" class="nav-item">Edit</a>
            <a href="book-add.html" class="nav-item">Add</a>
            <a href="manage.html" class="nav-item active">Manage</a>
            <span id="user-nav-info" style="border-left:1px solid rgba(255,255,255,.1);padding:0 12px;margin-left:8px"></span>
            <a href="../user/login.html" class="nav-item nav-logout" id="logout-link">Logout</a>
        </nav>
    </header>

    <main>
      <div id="view" class="tab-content active">
        <div class="content-card">
          <h1 class="page-title">Book Management</h1>
          <p class="page-description">Manage your collection below. Use the tabs to add, edit, or delete books.</p>
          <hr class="divider" />

          <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="showMgmtTab('add')">+ Add New Book</button>
          </div>

          <table class="data-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="mgmt-book-list"></tbody>
          </table>
        </div>
      </div>

      <div id="add" class="tab-content">
        <div class="content-card">
          <h1 class="page-title">Add New Book</h1>
          <hr class="divider" />

          <form onsubmit="return mgmtAddBook()">
            <label for="mgmt-title">Title <em class="required">(required)</em></label>
            <input type="text" id="mgmt-title" required />

            <label for="mgmt-author">Author <em class="required">(required)</em></label>
            <input type="text" id="mgmt-author" required />

            <label for="mgmt-category">Category</label>
            <select id="mgmt-category">
              <option value="">-- Select --</option>
              <option value="Fiction">Fiction</option>
              <option value="Non-Fiction">Non-Fiction</option>
              <option value="Dystopian">Dystopian</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Romance">Romance</option>
              <option value="Science">Science</option>
              <option value="History">History</option>
              <option value="Technology">Technology</option>
              <option value="Programming">Programming</option>
              <option value="Other">Other</option>
            </select>

            <label for="mgmt-description">Description</label>
            <textarea id="mgmt-description" rows="4"></textarea>

            <br />
            <table width="100%">
              <tr>
                <td align="right">
                  <button type="button" class="btn btn-secondary" onclick="showMgmtTab('view')">Cancel</button>
                  &nbsp;
                  <button type="submit" class="btn btn-primary">Add Book</button>
                </td>
              </tr>
            </table>
          </form>
        </div>
      </div>

      <div id="edit" class="tab-content">
        <div class="content-card">
          <h1 class="page-title">Edit Book</h1>
          <hr class="divider" />

          <form onsubmit="return mgmtUpdateBook()">
            <input type="hidden" id="mgmt-edit-id" />

            <label for="mgmt-edit-title">Title <em class="required">(required)</em></label>
            <input type="text" id="mgmt-edit-title" required />

            <label for="mgmt-edit-author">Author <em class="required">(required)</em></label>
            <input type="text" id="mgmt-edit-author" required />

            <label for="mgmt-edit-category">Category</label>
            <select id="mgmt-edit-category">
              <option value="">-- Select --</option>
              <option value="Fiction">Fiction</option>
              <option value="Non-Fiction">Non-Fiction</option>
              <option value="Dystopian">Dystopian</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Romance">Romance</option>
              <option value="Science">Science</option>
              <option value="History">History</option>
              <option value="Technology">Technology</option>
              <option value="Programming">Programming</option>
              <option value="Other">Other</option>
            </select>

            <label for="mgmt-edit-description">Description</label>
            <textarea id="mgmt-edit-description" rows="4"></textarea>

            <br />
            <table width="100%">
              <tr>
                <td align="right">
                  <button type="button" class="btn btn-secondary" onclick="showMgmtTab('view')">Cancel</button>
                  &nbsp;
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </td>
              </tr>
            </table>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy;2026 Bookify. All rights reserved.</p>
    </footer>

    <script>
      function showMgmtTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
      }

      function loadMgmtBooks() {
        const books = JSON.parse(localStorage.getItem('books')) || [];
        const tbody = document.getElementById('mgmt-book-list');
        tbody.innerHTML = '';
        books.forEach(book => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="td-primary">${book.title}</td>
            <td class="td-muted">${book.author}</td>
            <td><span class="category-badge">${book.category}</span></td>
            <td class="text-center" style="white-space:nowrap">
              <a href="#" class="action-link" onclick="mgmtEditBook(${book.id})">Edit</a>
              <a href="#" class="action-link--danger" onclick="mgmtDeleteBook(${book.id})">Delete</a>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function mgmtAddBook() {
        const title = document.getElementById('mgmt-title').value.trim();
        const author = document.getElementById('mgmt-author').value.trim();
        const category = document.getElementById('mgmt-category').value;
        const description = document.getElementById('mgmt-description').value.trim();
        if (!title || !author || !category) { alert('Title, author, and category are required.'); return false; }
        const books = JSON.parse(localStorage.getItem('books')) || [];
        const newBook = {
          id: books.length ? Math.max(...books.map(b => b.id)) + 1 : 1,
          title, author, category,
          description,
          price: 0, available: true, borrowedBy: null,
          coverUrl: 'https://placehold.co/150x200/e2e8f0/64748b?text=' + encodeURIComponent(title)
        };
        books.push(newBook);
        localStorage.setItem('books', JSON.stringify(books));
        alert('Book added successfully.');
        showMgmtTab('view');
        loadMgmtBooks();
        return false;
      }

      function mgmtEditBook(id) {
        const books = JSON.parse(localStorage.getItem('books')) || [];
        const book = books.find(b => b.id == id);
        if (!book) return;
        document.getElementById('mgmt-edit-id').value = book.id;
        document.getElementById('mgmt-edit-title').value = book.title;
        document.getElementById('mgmt-edit-author').value = book.author;
        document.getElementById('mgmt-edit-category').value = book.category;
        document.getElementById('mgmt-edit-description').value = book.description || '';
        showMgmtTab('edit');
      }

      function mgmtUpdateBook() {
        const id = document.getElementById('mgmt-edit-id').value;
        const title = document.getElementById('mgmt-edit-title').value.trim();
        const author = document.getElementById('mgmt-edit-author').value.trim();
        const category = document.getElementById('mgmt-edit-category').value;
        const description = document.getElementById('mgmt-edit-description').value.trim();
        if (!title || !author || !category) { alert('Title, author, and category are required.'); return false; }
        const books = JSON.parse(localStorage.getItem('books')) || [];
        const idx = books.findIndex(b => b.id == id);
        if (idx !== -1) {
          books[idx].title = title;
          books[idx].author = author;
          books[idx].category = category;
          books[idx].description = description;
          localStorage.setItem('books', JSON.stringify(books));
          alert('Book updated successfully.');
          showMgmtTab('view');
          loadMgmtBooks();
        }
        return false;
      }

      function mgmtDeleteBook(id) {
        if (!confirm('Are you sure you want to delete this book? This cannot be undone.')) return;
        const books = JSON.parse(localStorage.getItem('books')) || [];
        const idx = books.findIndex(b => b.id == id);
        if (idx !== -1) {
          books.splice(idx, 1);
          localStorage.setItem('books', JSON.stringify(books));
          alert('Book deleted successfully.');
          loadMgmtBooks();
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        if (typeof initializeData === 'function') initializeData();
        const userInfo = document.getElementById('user-nav-info');
        const user = JSON.parse(localStorage.getItem('users'))?.find(u => u.id == localStorage.getItem('currentUser'));
        if (userInfo) userInfo.textContent = user ? 'Admin: ' + user.username : 'Admin Panel';
        const logoutLink = document.getElementById('logout-link');
        if (logoutLink) logoutLink.onclick = (e) => { e.preventDefault(); logout(); };
        loadMgmtBooks();
      });
    </script>
    <script src="../js/admin.js"></script>
  </body>
</html>
