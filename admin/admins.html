<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin - Manage Admins</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/layout.css" />
        <link rel="stylesheet" href="../css/components.css" />
        <link rel="stylesheet" href="../css/utilities.css" />
    </head>
    <body>
        <header>
            <nav class="nav-island">
                <span class="nav-brand">Bookify</span>
                <div class="nav-pages">
                    <a href="catalog.html" class="nav-item">Books</a>
                    <a href="borrowed.html" class="nav-item">Borrowed</a>
                    <a href="book-edit.html" class="nav-item">Edit</a>
                    <a href="book-add.html" class="nav-item">Add</a>
                    <a href="admins.html" class="nav-item active nav-item--hidden" id="nav-admins">Admins</a>
                </div>
                <span id="user-nav-info"></span>
                <a href="../user/login.html" class="nav-item nav-logout nav-logout-icon" id="logout-link" title="Logout"
                    >⏻</a
                >
            </nav>
        </header>

        <main>
            <div class="content-card">
                <h1 class="page-title">Admin Management</h1>
                <p class="page-description">
                    Create and manage administrator accounts. Only superusers can access this page.
                </p>
                <hr class="divider" />

                <div
                    id="superuser-warning"
                    style="
                        display: none;
                        background: #fef2f2;
                        border: 1px solid #fecaca;
                        border-radius: 8px;
                        padding: 20px;
                        margin-bottom: 24px;
                        text-align: center;
                    "
                >
                    <p style="color: var(--danger); font-weight: 700; margin: 0">Access Denied</p>
                    <p style="color: var(--text2); font-size: 14px; margin: 8px 0 0">
                        Only superusers can manage admin accounts.
                    </p>
                </div>

                <div id="admin-content">
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap">
                        <button class="btn btn-primary" onclick="showCreateForm()">+ New Admin</button>
                    </div>

                    <div id="create-form" style="display: none">
                        <div class="form-section">
                            <h3 class="form-section-title">Create Admin Account</h3>

                            <div class="form-row">
                                <div class="form-field">
                                    <label for="adm-username">Username <span class="required">*</span></label>
                                    <input type="text" id="adm-username" required placeholder="Enter username" />
                                </div>
                                <div class="form-field">
                                    <label for="adm-email">Email <span class="required">*</span></label>
                                    <input type="email" id="adm-email" required placeholder="admin@example.com" />
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-field">
                                    <label for="adm-password">Password <span class="required">*</span></label>
                                    <input type="password" id="adm-password" required placeholder="Create a password" />
                                </div>
                                <div class="form-field">
                                    <label for="adm-cpw">Confirm Password <span class="required">*</span></label>
                                    <input type="password" id="adm-cpw" required placeholder="Repeat password" />
                                </div>
                            </div>

                            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px">
                                <button type="button" class="btn btn-secondary" onclick="hideCreateForm()">
                                    Cancel
                                </button>
                                <button type="button" class="btn btn-primary" onclick="createAdmin()">
                                    Create Admin
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="user-grid" id="admin-list"></div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy;2026 Bookify. All rights reserved.</p>
        </footer>

        <script src="../js/shared.js"></script>
        <script>
            /* global apiFetch, getCurrentUser, initializeData, logout, showAlert, showConfirm */

            function loadAdmins() {
                apiFetch('/users/')
                    .then(function (users) {
                        var admins = users.filter(function (u) {
                            return u.is_admin;
                        });
                        var grid = document.getElementById('admin-list');
                        grid.innerHTML = '';
                        admins.forEach(function (u) {
                            var initial = u.username.charAt(0).toUpperCase();
                            var avatarClass = u.is_superuser ? 'user-avatar--superuser' : 'user-avatar--admin';
                            var roleClass = u.is_superuser ? 'user-role--superuser' : 'user-role--admin';
                            var roleLabel = u.is_superuser ? 'Superuser' : 'Admin';
                            var actions = u.is_superuser
                                ? ''
                                : '<a href="#" class="btn btn-danger" style="padding:6px 14px;font-size:11px" onclick="deleteAdmin(' +
                                  u.id +
                                  ')">Remove</a>';
                            var card = document.createElement('div');
                            card.className = 'user-card';
                            card.innerHTML =
                                '<div class="user-avatar ' +
                                avatarClass +
                                '">' +
                                initial +
                                '</div><div class="user-info"><h3>' +
                                u.username +
                                '</h3><p>' +
                                u.email +
                                '</p><span class="user-role ' +
                                roleClass +
                                '">' +
                                roleLabel +
                                '</span></div>' +
                                (actions ? '<div>' + actions + '</div>' : '');
                            grid.appendChild(card);
                        });
                    })
                    .catch(function () {
                        var users = JSON.parse(localStorage.getItem('users') || '[]');
                        var admins = users.filter(function (u) {
                            return u.isAdmin;
                        });
                        var grid = document.getElementById('admin-list');
                        grid.innerHTML = '';
                        admins.forEach(function (u) {
                            var initial = u.username.charAt(0).toUpperCase();
                            var avatarClass = u.isSuperuser ? 'user-avatar--superuser' : 'user-avatar--admin';
                            var roleClass = u.isSuperuser ? 'user-role--superuser' : 'user-role--admin';
                            var roleLabel = u.isSuperuser ? 'Superuser' : 'Admin';
                            var actions = u.isSuperuser
                                ? ''
                                : '<a href="#" class="btn btn-danger" style="padding:6px 14px;font-size:11px" onclick="deleteAdmin(' +
                                  u.id +
                                  ')">Remove</a>';
                            var card = document.createElement('div');
                            card.className = 'user-card';
                            card.innerHTML =
                                '<div class="user-avatar ' +
                                avatarClass +
                                '">' +
                                initial +
                                '</div><div class="user-info"><h3>' +
                                u.username +
                                '</h3><p>' +
                                u.email +
                                '</p><span class="user-role ' +
                                roleClass +
                                '">' +
                                roleLabel +
                                '</span></div>' +
                                (actions ? '<div>' + actions + '</div>' : '');
                            grid.appendChild(card);
                        });
                    });
            }

            function showCreateForm() {
                document.getElementById('create-form').style.display = 'block';
            }

            function hideCreateForm() {
                document.getElementById('create-form').style.display = 'none';
                document.getElementById('adm-username').value = '';
                document.getElementById('adm-email').value = '';
                document.getElementById('adm-password').value = '';
                document.getElementById('adm-cpw').value = '';
            }

            function createAdmin() {
                var username = document.getElementById('adm-username').value.trim();
                var email = document.getElementById('adm-email').value.trim();
                var password = document.getElementById('adm-password').value.trim();
                var cpw = document.getElementById('adm-cpw').value.trim();
                if (!username || !email || !password || !cpw) {
                    showAlert('All fields are required.');
                    return;
                }
                if (password !== cpw) {
                    showAlert('Passwords do not match.');
                    return;
                }
                apiFetch('/auth/signup/', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        password_confirm: cpw
                    })
                })
                    .then(function (data) {
                        return apiFetch('/users/' + data.user.id + '/toggle-admin/', { method: 'PATCH' });
                    })
                    .then(function () {
                        showAlert('Admin account created: ' + username);
                        hideCreateForm();
                        loadAdmins();
                    })
                    .catch(function (err) {
                        showAlert(err.message || 'Failed to create admin.');
                    });
            }

            function deleteAdmin(id) {
                showConfirm('Remove this admin account? They will lose all admin access.', function () {
                    apiFetch('/users/' + id + '/toggle-admin/', { method: 'PATCH' })
                        .then(function () {
                            showAlert('Admin removed.');
                            loadAdmins();
                        })
                        .catch(function () {
                            var users = JSON.parse(localStorage.getItem('users') || '[]');
                            var idx = users.findIndex(function (u) {
                                return u.id == id;
                            });
                            if (idx !== -1) {
                                users[idx].isAdmin = false;
                                users[idx].isSuperuser = false;
                                localStorage.setItem('users', JSON.stringify(users));
                                showAlert('Admin removed.');
                                loadAdmins();
                            }
                        });
                });
            }

            function checkSuperuserAccess() {
                var user = getCurrentUser();
                var content = document.getElementById('admin-content');
                var warning = document.getElementById('superuser-warning');
                if (!user || !user.isSuperuser) {
                    content.style.display = 'none';
                    warning.style.display = 'block';
                } else {
                    content.style.display = 'block';
                    warning.style.display = 'none';
                }
                var link = document.getElementById('nav-admins');
                if (link && user && user.isSuperuser) {
                    link.classList.remove('nav-item--hidden');
                }
            }

            document.addEventListener('DOMContentLoaded', function () {
                initializeData();
                var userInfo = document.getElementById('user-nav-info');
                var user = getCurrentUser();
                if (userInfo)
                    userInfo.innerHTML = user ? '<span class="nav-user-icon">👤</span>' + user.username : 'Admin Panel';
                var logoutLink = document.getElementById('logout-link');
                if (logoutLink)
                    logoutLink.onclick = function (e) {
                        e.preventDefault();
                        logout();
                    };
                checkSuperuserAccess();
                loadAdmins();
            });
        </script>
        <script src="../js/admin-ui.js"></script>
    </body>
</html>
