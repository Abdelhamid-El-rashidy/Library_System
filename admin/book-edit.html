<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Edit Book</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
        <nav class="nav-island">
            <a href="catalog.html" class="nav-item">Books</a>
            <a href="book-edit.html" class="nav-item active">Edit</a>
            <a href="book-add.html" class="nav-item">Add</a>
            <a href="manage.html" class="nav-item">Manage</a>
            <a href="admins.html" class="nav-item nav-item--hidden" id="nav-admins">Admins</a>
            <span id="user-nav-info"></span>
            <a href="../user/login.html" class="nav-item nav-logout" id="logout-link">Logout</a>
        </nav>
    </header>

    <main>
      <div class="content-card">
        <h1 class="page-title">Edit Book Details</h1>
        <p class="page-description">Update the information for this record below.</p>
        <hr class="divider" />

        <form action="#" method="post">
          <div class="form-section">
            <h3 class="form-section-title">Book Details</h3>

            <div class="form-field">
              <label for="title">Title <span class="required">*</span></label>
              <input type="text" id="title" name="title" required />
            </div>

            <div class="form-field">
              <label for="author">Author <span class="required">*</span></label>
              <input type="text" id="author" name="author" required />
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="isbn">Book ID</label>
                <input type="text" id="isbn" name="isbn" readonly />
              </div>
              <div class="form-field">
                <label for="category">Category</label>
                <select id="category" name="category">
                  <option value="">-- Select --</option>
                  <option value="Fiction">Fiction</option>
                  <option value="Non-Fiction">Non-Fiction</option>
                  <option value="Dystopian">Dystopian</option>
                  <option value="Fantasy">Fantasy</option>
                  <option value="Romance">Romance</option>
                  <option value="Science">Science</option>
                  <option value="History">History</option>
                  <option value="Technology">Technology</option>
                  <option value="Programming">Programming</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-field">
              <label for="description">Description</label>
              <textarea id="description" name="description" rows="5"></textarea>
            </div>

            <div class="form-field">
              <label for="cover-file">Cover Photo</label>
              <input type="file" id="cover-file" accept="image/*" onchange="previewCover(this)" />
              <div id="cover-preview" style="margin-top:8px"></div>
              <input type="hidden" id="cover-data" />
              <p style="color:var(--text3);font-size:12px;margin:6px 0 0">Upload a new cover image, or leave empty to keep the current one.</p>
            </div>
          </div>

          <div style="display:flex;gap:10px;justify-content:flex-end">
            <button type="button" class="btn btn-secondary" onclick="window.location.href='catalog.html'">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy;2026 Bookify. All rights reserved.</p>
    </footer>
    <script src="../js/admin.js"></script>
  </body>
</html>
