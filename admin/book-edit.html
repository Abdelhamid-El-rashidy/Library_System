<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Edit Book</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
        <nav class="nav-island">
            <a href="catalog.html" class="nav-item">Books</a>
            <a href="book-edit.html" class="nav-item active">Edit</a>
            <a href="book-add.html" class="nav-item">Add</a>
            <a href="manage.html" class="nav-item">Manage</a>
            <span id="user-nav-info" style="border-left:1px solid rgba(255,255,255,.1);padding:0 12px;margin-left:8px"></span>
            <a href="../user/login.html" class="nav-item nav-logout" id="logout-link">Logout</a>
        </nav>
    </header>

    <main>
      <div class="content-card">
        <h1 class="page-title">Edit Book Details</h1>
        <p class="page-description">Update the information for this record below.</p>
        <hr class="divider" />

        <form action="#" method="post">
          <span class="form-legend">Book Details</span>

          <label for="title">Title <em class="required">(required)</em></label>
          <input type="text" id="title" name="title" required />

          <label for="author">Author <em class="required">(required)</em></label>
          <input type="text" id="author" name="author" required />

          <label for="isbn">Book ID</label>
          <input type="text" id="isbn" name="isbn" readonly style="background:#f1f5f9;color:#64748b" />

          <label for="category">Category / Genre</label>
          <select id="category" name="category">
            <option value="">-- Select --</option>
            <option value="Fiction">Fiction</option>
            <option value="Non-Fiction">Non-Fiction</option>
            <option value="Dystopian">Dystopian</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
            <option value="Technology">Technology</option>
            <option value="Programming">Programming</option>
            <option value="Other">Other</option>
          </select>

          <label for="price">Price ($)</label>
          <input type="number" id="price" name="price" step="0.01" min="0" />

          <span class="form-legend">Description &amp; Media</span>

          <label for="description">Description / Summary</label>
          <textarea id="description" name="description" rows="5"></textarea>

          <br />
          <table width="100%">
            <tr>
              <td align="right">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='catalog.html'">Cancel</button>
                &nbsp;
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </td>
            </tr>
          </table>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy;2026 Bookify. All rights reserved.</p>
    </footer>
    <script src="../js/admin.js"></script>
  </body>
</html>
