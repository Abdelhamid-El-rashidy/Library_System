<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Edit Book</title>
</head>

<body
    style="background-color: #F9FAFB; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <header style="background-color: #111827; border-bottom: 1px solid #1F2937;">
        <nav>
            <table style="width: 100%; border-collapse: collapse;">
                <tr style="text-align: center;">
                    <td style="width: 25%; padding: 16px;">
                        <a href="#"
                            style="color: #9CA3AF; text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Dashboard</a>
                    </td>
                    <td style="width: 25%; padding: 16px;">
                        <a href="admin-books.html"
                            style="color: #9CA3AF; text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Books</a>
                    </td>
                    <td style="width: 25%; padding: 16px; border-bottom: 3px solid #F59E0B;">
                        <a href="admin-edit-book.html"
                            style="color: #F59E0B; text-decoration: none; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;">Edit
                            Book</a>
                    </td>
                    <td style="width: 25%; padding: 16px;">
                        <a href="admin-add-book.html"
                            style="color: #9CA3AF; text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Add
                            Book</a>
                    </td>
                </tr>
            </table>
        </nav>
    </header>

    <main>
        <br><br>
        <table width="90%" align="center" border="0" cellpadding="0" cellspacing="0"
            style="background-color: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
            <tr>
                <td style="padding: 40px;">
                    <h1
                        style="color: #111827; margin-top: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.025em;">
                        Edit Book Details</h1>
                    <p style="color: #6B7280; font-size: 14px;">Update the information for this record below.</p>
                    <hr style="border: 0; border-top: 1px solid #F3F4F6; margin: 32px 0;">

                    <form action="#" method="post">

                        <legend style="font-size: 18px; color: #111827; font-weight: 600; margin-bottom: 24px;">Book
                            Details</legend>

                        <p>
                            <label for="title"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Title
                                <em style="color: #EF4444;">(required)</em></label>
                            <input type="text" id="title" name="title" value="To Kill a Mockingbird" required
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <p>
                            <label for="author"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Author
                                <em style="color: #EF4444;">(required)</em></label>
                            <input type="text" id="author" name="author" value="Harper Lee" required
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <p>
                            <label for="isbn"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">ISBN
                                <em style="color: #EF4444;">(required)</em></label>
                            <input type="text" id="isbn" name="isbn" value="978-0-06-112008-4" required
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <p>
                            <label for="publisher"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Publisher</label>
                            <input type="text" id="publisher" name="publisher" value="J. B. Lippincott &amp; Co."
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <p>
                            <label for="publication_year"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Publication
                                Year</label>
                            <input type="number" id="publication_year" name="publication_year" min="1000" max="2099"
                                value="1960"
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>


                        <legend style="font-size: 18px; color: #111827; font-weight: 600; margin-bottom: 24px;">
                            Additional Information</legend>

                        <p>
                            <label for="category"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Category
                                / Genre</label>
                            <select id="category" name="category"
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; background-color: #FFFFFF; box-sizing: border-box;">
                                <option value="">-- Select --</option>
                                <option value="fiction" selected>Fiction</option>
                                <option value="non-fiction">Non-Fiction</option>
                                <option value="science">Science</option>
                                <option value="history">History</option>
                                <option value="technology">Technology</option>
                                <option value="philosophy">Philosophy</option>
                                <option value="biography">Biography</option>
                                <option value="other">Other</option>
                            </select>
                        </p>

                        <p>
                            <label for="language"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Language</label>
                            <select id="language" name="language"
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; background-color: #FFFFFF; box-sizing: border-box;">
                                <option value="english" selected>English</option>
                                <option value="arabic">Arabic</option>
                                <option value="french">French</option>
                                <option value="other">Other</option>
                            </select>
                        </p>

                        <p>
                            <label for="pages"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Number
                                of Pages</label>
                            <input type="number" id="pages" name="pages" min="1" value="281"
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <p>
                            <label for="copies"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Number
                                of Copies <em style="color: #EF4444;">(required)</em></label>
                            <input type="number" id="copies" name="copies" min="1" value="5" required
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <legend style="font-size: 18px; color: #111827; font-weight: 600; margin-bottom: 24px;">
                            Description &amp; Media</legend>

                        <p>
                            <label for="description"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Description
                                / Summary</label>
                            <textarea id="description" name="description" rows="5"
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">A novel about racial injustice in the Deep South.</textarea>
                        </p>

                        <p>
                            <label for="cover_image_url"
                                style="display: block; color: #374151; font-size: 14px; font-weight: 500; margin-bottom: 8px;">Cover
                                Image URL</label>
                            <input type="url" id="cover_image_url" name="cover_image_url"
                                placeholder="https://example.com/cover.jpg"
                                style="width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 4px; font-size: 14px; color: #111827; box-sizing: border-box;">
                        </p>

                        <br>
                        <table width="100%">
                            <tr>
                                <td align="right">
                                    <input type="button" value="Cancel"
                                        onclick="window.location.href='admin-books.html'"
                                        style="background-color: #FFFFFF; color: #6B7280; padding: 12px 24px; border: 1px solid #D1D5DB; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600;">
                                    &nbsp;
                                    <input type="submit" value="Save Changes"
                                        style="background-color: #D97706; color: #FFFFFF; padding: 12px 32px; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 0.025em;">
                                </td>
                            </tr>
                        </table>
                    </form>
                </td>
            </tr>
        </table>
    </main>

    <footer style="padding: 48px 0; background-color: #111827;">
        <table width="100%">
            <tr align="center">
                <td>
                    <font color="#9CA3AF" size="2">&copy;2026 Bookify. All rights reserved.</font>
                </td>
            </tr>
        </table>
    </footer>
</body>

</html>
