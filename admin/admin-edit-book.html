<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Edit Book</title>
</head>

<body>
    <header>
        <nav>
            <table width="100%" bgcolor="#F8F9FA">
                <tr align=" center">
                    <td width="25%"><a href="#">
                            <font color="#4A6FA5" face="Arial">Dashboard</font>
                        </a></td>
                    <td width="25%"><a href="admin-books.html">
                            <font color="#1E3A8A" face="Arial">Books</font>
                        </a></td>
                    <td width="25%"><a href="admin-add-book.html">
                            <font color="#4A6FA5" face="Arial">Add Book</font>
                        </a></td>
                    <td width="25%"><a href="admin-edit-book.html">
                            <font color="#1E3A8A" face="Arial"><strong>Edit Book</strong></font>
                        </a></td>
                </tr>
            </table>
        </nav>
    </header>

    <main>
        <h1>Edit Book Details</h1>
        <p><em>The form below is pre-filled with the selected book's current data.</em></p>

        <form action="#" method="post">
            <fieldset>
                <legend>Book Details</legend>

                <p>
                    <label for="title">Title <em>(required)</em></label><br>
                    <input type="text" id="title" name="title" value="To Kill a Mockingbird" required>
                </p>

                <p>
                    <label for="author">Author <em>(required)</em></label><br>
                    <input type="text" id="author" name="author" value="Harper Lee" required>
                </p>

                <p>
                    <label for="isbn">ISBN <em>(required)</em></label><br>
                    <input type="text" id="isbn" name="isbn" value="978-0-06-112008-4" required>
                </p>

                <p>
                    <label for="publisher">Publisher</label><br>
                    <input type="text" id="publisher" name="publisher" value="J. B. Lippincott &amp; Co.">
                </p>

                <p>
                    <label for="publication_year">Publication Year</label><br>
                    <input type="number" id="publication_year" name="publication_year" min="1000" max="2099"
                        value="1960">
                </p>
            </fieldset>

            <fieldset>
                <legend>Additional Information</legend>

                <p>
                    <label for="category">Category / Genre</label><br>
                    <select id="category" name="category">
                        <option value="">-- Select --</option>
                        <option value="fiction" selected>Fiction</option>
                        <option value="non-fiction">Non-Fiction</option>
                        <option value="science">Science</option>
                        <option value="history">History</option>
                        <option value="technology">Technology</option>
                        <option value="philosophy">Philosophy</option>
                        <option value="biography">Biography</option>
                        <option value="other">Other</option>
                    </select>
                </p>

                <p>
                    <label for="language">Language</label><br>
                    <select id="language" name="language">
                        <option value="english" selected>English</option>
                        <option value="arabic">Arabic</option>
                        <option value="french">French</option>
                        <option value="other">Other</option>
                    </select>
                </p>

                <p>
                    <label for="pages">Number of Pages</label><br>
                    <input type="number" id="pages" name="pages" min="1" value="281">
                </p>

                <p>
                    <label for="copies">Number of Copies <em>(required)</em></label><br>
                    <input type="number" id="copies" name="copies" min="1" value="5" required>
                </p>
            </fieldset>

            <fieldset>
                <legend>Description &amp; Media</legend>

                <p>
                    <label for="description">Description / Summary</label><br>
                    <textarea id="description" name="description" rows="5"
                        cols="50">A novel about racial injustice in the Deep South.</textarea>
                </p>

                <p>
                    <label for="cover_image_url">Cover Image URL</label><br>
                    <input type="url" id="cover_image_url" name="cover_image_url"
                        placeholder="https://example.com/cover.jpg">
                </p>
            </fieldset>

            <p>
                <button type="submit">Save Changes</button>
                <button type="button" onclick="window.location.href='admin-books.html'">Cancel</button>
            </p>
        </form>
    </main>

    <footer>
        <hr>
        <p>&copy; 2025 Library System — Admin Edit Book - By Muhammad Fouad</p>
    </footer>
</body>

</html>
