<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin - Borrowed Books</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/layout.css" />
        <link rel="stylesheet" href="../css/components.css" />
        <link rel="stylesheet" href="../css/utilities.css" />
    </head>
    <body>
        <header>
            <nav class="nav-island">
                <span class="nav-brand">Bookify</span>
                <div class="nav-pages">
                    <a href="catalog.html" class="nav-item">Books</a>
                    <a href="borrowed.html" class="nav-item active">Borrowed</a>
                    <a href="book-edit.html" class="nav-item">Edit</a>
                    <a href="book-add.html" class="nav-item">Add</a>
                    <a href="admins.html" class="nav-item nav-item--hidden" id="nav-admins">Admins</a>
                </div>
                <span id="user-nav-info"></span>
                <a href="../login.html" class="nav-item nav-logout nav-logout-icon" id="logout-link" title="Logout"
                    >⏻</a
                >
            </nav>
        </header>

        <main>
            <div class="content-card">
                <h1 class="page-title">Borrowed Books</h1>
                <p class="page-description">View all books currently borrowed from the library.</p>
                <hr class="divider" />

                <div class="section-title">
                    Active Borrows
                    <span class="count" id="borrowed-count">0</span>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Cover</th>
                            <th>Book</th>
                            <th>Author</th>
                            <th>Borrowed By</th>
                            <th>Due Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="borrowed-tbody"></tbody>
                </table>
                <div id="borrowed-pagination"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Bookify</p>
        </footer>
        <script src="../js/shared.js"></script>
        <script src="../js/admin-ui.js"></script>
        <script src="../js/admin-borrowed.js"></script>
    </body>
</html>
