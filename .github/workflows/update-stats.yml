name: Update README Stats

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  update-stats:
    if: github.event.head_commit.author.email != 'action@github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update Stats
        run: python update_stats.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update contributor stats [skip ci]" && git push)
