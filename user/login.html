<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookify - Log In</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="standalone-page">
    <div class="content-card">
        <div class="standalone-logo"><span>Bookify</span></div>
        <h2 class="page-subtitle">Welcome Back</h2>
        <p class="page-description">Sign in to your account to continue.</p>

        <hr class="divider" />

        <form action="login" method="post">
            <div class="form-group">
                <label for="us">Username <span class="required">*</span></label>
                <input id="us" type="text" name="username" required placeholder="Enter your username" autofocus />
            </div>
            <div class="form-group">
                <label for="pw">Password <span class="required">*</span></label>
                <input id="pw" type="password" name="password" required placeholder="Enter your password" />
            </div>
            <div class="submit-actions" style="margin-top:8px">
                <button type="submit" class="btn btn-primary">Sign In</button>
            </div>
        </form>

        <p style="text-align:center;margin:20px 0 0;font-size:13px;color:var(--text3)">
            Don't have an account? <a href="signup.html" style="color:var(--accent-dark);font-weight:600;text-decoration:none">Sign Up</a>
        </p>
    </div>
    <script src="../js/user.js"></script>
</body>
</html>
