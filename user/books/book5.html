<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hobbit - Bookify</title>
    <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
    <header>
        <nav class="nav-island">
            <span class="nav-brand">Bookify</span>
            <div class="nav-pages">
                <a href="../dashboard.html" class="nav-item">Home</a>
                <a href="../borrowed.html" class="nav-item">Borrowed</a>
                <a href="../search.html" class="nav-item">Search</a>
            </div>
            <span id="user-nav-info"></span>
            <a href="../login.html" class="nav-item nav-logout nav-logout-icon" id="logout-link" title="Logout">⏻</a>
        </nav>
    </header>

    <main class="content-card">
        <h1 class="page-title">Book Details</h1>
        <div class="book-info-section" style="display:flex;gap:28px;flex-wrap:wrap">
            <div style="flex-shrink:0">
                <img id="book-cover-img" src="https://placehold.co/150x200/fff7ed/b45309?text=The+Hobbit" alt="The Hobbit" style="width:150px;height:210px;object-fit:cover;border-radius:8px;border:1px solid var(--border);box-shadow:var(--shadow-hover)" />
            </div>
            <div style="flex:1;min-width:250px">
                <h2 class="form-legend">The Hobbit</h2>
                <p><strong class="td-primary">Author:</strong> <span id="book-author" class="td-muted">J.R.R. Tolkien</span></p>
                <p><strong class="td-primary">Category:</strong> <span id="book-category" class="category-badge">Fantasy</span></p>
                <p><strong class="td-primary">Status:</strong> <span id="book-status" class="warning-text">Borrowed</span></p>
                <hr class="divider">
                <p id="book-description" class="page-description">The Hobbit, or There and Back Again is a children's fantasy novel by English author J. R. R. Tolkien.</p>
            </div>
        </div>
        <div style="margin-top:24px">
            <button id="borrow-btn" class="btn btn-secondary" disabled>Book Not Available</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Bookify. All rights reserved.</p>
    </footer>
    <script src="../../js/user.js"></script>
</body>
</html>
