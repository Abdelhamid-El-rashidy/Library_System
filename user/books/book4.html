<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>The Catcher in the Rye - Bookify</title>
        <link rel="stylesheet" href="../../css/base.css" />
        <link rel="stylesheet" href="../../css/layout.css" />
        <link rel="stylesheet" href="../../css/components.css" />
        <link rel="stylesheet" href="../../css/utilities.css" />
    </head>
    <body>
        <header>
            <nav class="nav-island">
                <span class="nav-brand">Bookify</span>
                <div class="nav-pages">
                    <a href="../dashboard.html" class="nav-item">Home</a>
                    <a href="../borrowed.html" class="nav-item">Borrowed</a>
                    <a href="../search.html" class="nav-item">Search</a>
                </div>
                <span id="user-nav-info"></span>
                <a href="../../login.html" class="nav-item nav-logout nav-logout-icon" id="logout-link" title="Logout"
                    >⏻</a
                >
            </nav>
        </header>

        <main class="content-card">
            <h1 class="page-title">Book Details</h1>
            <div class="book-info-section" style="display: flex; gap: 28px; flex-wrap: wrap">
                <div style="flex-shrink: 0">
                    <img
                        id="book-cover-img"
                        src="https://placehold.co/150x200/fff7ed/b45309?text=Catcher+Rye"
                        alt="The Catcher in the Rye"
                        style="
                            width: 150px;
                            height: 210px;
                            object-fit: cover;
                            border-radius: 8px;
                            border: 1px solid var(--border);
                            box-shadow: var(--shadow-hover);
                        "
                    />
                </div>
                <div style="flex: 1; min-width: 250px">
                    <h2 class="form-legend">The Catcher in the Rye</h2>
                    <p>
                        <strong class="td-primary">Author:</strong>
                        <span id="book-author" class="td-muted">J.D. Salinger</span>
                    </p>
                    <p>
                        <strong class="td-primary">Category:</strong>
                        <span id="book-category" class="category-badge">Fiction</span>
                    </p>
                    <p>
                        <strong class="td-primary">Status:</strong>
                        <span id="book-status" class="td-primary">Available</span>
                    </p>
                    <hr class="divider" />
                    <p id="book-description" class="page-description">
                        The Catcher in the Rye is a novel by J. D. Salinger that was partially published in serial form
                        in 1945–1946 and as a novel in 1951.
                    </p>
                </div>
            </div>
            <div style="margin-top: 24px">
                <button id="borrow-btn" class="btn btn-primary" disabled>Borrow Book</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Bookify</p>
        </footer>
        <script src="../../js/shared.js"></script>
        <script src="../../js/user-auth.js"></script>
        <script src="../../js/user-books.js"></script>
    </body>
</html>
