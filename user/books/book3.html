<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1984 - Bookify</title>
    <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
    <header>
        <nav class="nav-island">
            <a href="../dashboard.html" class="nav-item">Home</a>
            <a href="../borrowed.html" class="nav-item">Borrowed</a>
            <a href="../search.html" class="nav-item">Search</a>
            <span id="user-nav-info"></span>
            <a href="../login.html" class="nav-item nav-logout" id="logout-link">Logout</a>
        </nav>
    </header>

    <main class="content-card">
        <h1 class="page-title">Book Details</h1>
        <div class="book-info-section" style="display:flex;gap:28px;flex-wrap:wrap">
            <div style="flex-shrink:0">
                <img id="book-cover-img" src="https://placehold.co/150x200/fff7ed/b45309?text=1984" alt="1984" style="width:150px;height:210px;object-fit:cover;border-radius:8px;border:1px solid var(--border);box-shadow:var(--shadow-hover)" />
            </div>
            <div style="flex:1;min-width:250px">
                <h2 class="form-legend">1984</h2>
                <p><strong class="td-primary">Author:</strong> <span id="book-author" class="td-muted">George Orwell</span></p>
                <p><strong class="td-primary">Category:</strong> <span id="book-category" class="category-badge">Dystopian</span></p>
                <p><strong class="td-primary">Status:</strong> <span id="book-status" class="td-primary">Available</span></p>
                <hr class="divider">
                <p id="book-description" class="page-description">1984 is a dystopian social science fiction novel and cautionary tale written by English writer George Orwell.</p>
            </div>
        </div>
        <div style="margin-top:24px">
            <button id="borrow-btn" class="btn btn-primary" disabled>Borrow Book</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Bookify. All rights reserved.</p>
    </footer>
    <script src="../../js/user.js"></script>
</body>
</html>
