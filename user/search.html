<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookify - Search</title>
    <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
    <header>
        <nav class="nav-island">
            <a href="index.html" class="nav-item">Home</a>
            <a href="borrowed.html" class="nav-item">Borrowed</a>
            <a href="search.html" class="nav-item active">Search</a>
            <span id="user-nav-info"></span>
            <a href="login.html" class="nav-item nav-logout" id="logout-link">Logout</a>
        </nav>
    </header>

    <main class="content-card">
        <h1 class="page-title">Bookify</h1>
        <h2 class="page-subtitle">Search Books</h2>
        <p class="page-description">Enter your search term below and select the search type.</p>
        <hr class="divider">
        <form>
            <span class="form-legend">Filter Collection</span>
            <label for="searchInput">Search <span class="required">*</span></label>
            <input type="text" id="searchInput" name="searchInput" placeholder="Enter search term..." required autofocus>
            <label for="searchBy">Search By:</label>
            <select id="searchBy" name="searchBy">
                <option value="Book">Book Name</option>
                <option value="Author">Author</option>
                <option value="Category">Category</option>
            </select>
            <div class="submit-actions" style="margin-top:10px">
                <button type="submit" class="btn btn-primary">Search</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>
        <hr class="divider">
        <h3 class="page-subtitle" style="margin-bottom:12px">Search Results</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Book Name</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Availability</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="5" style="text-align:center;color:var(--text3);padding:24px">Use the search form above to find books.</td></tr>
            </tbody>
        </table>
    </main>
    <footer>
        <p>&copy; 2026 Bookify. All rights reserved.</p>
    </footer>
    <script src="../js/user.js"></script>
</body>
</html>
