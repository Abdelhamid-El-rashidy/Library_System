<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bookify</title>
    <meta name="description" content="This is my library Store" />
  </head>
  <body>
    <!-- name page -->
    <h1>Bookify</h1>
    <!-- navigation bar -->
    <nav>
      <a title="Home Page" href="index.html">Home</a> |
      <a title="Available Books" href="books.html">Books</a> |
      <a title="Search" href="search.html">Search</a> |
      <!-- <a hidden title="Favourite Books" href="favorites.html">Favorites</a> | -->
      <a title="Borrowed books" href="borrowed.html">Borrowed</a> |
      <a title="Sign Up" href="SignUp.html">Sign Up</a>
    </nav>
    <!-- header -->
    <h1>Log In</h1>
    <form action="admin-books.html" method="post">
      <!-- username -->
      <div class="username">
        <label for="us">User Name</label>
        <input
          id="us"
          type="text"
          name="username"
          required
          placeholder="username"
          autofocus
        />
      </div>
      <br />
      <!-- password -->
      <div class="password">
        <label for="pw">Password</label>
        <input
          id="pw"
          type="password"
          name="password"
          required
          placeholder="password"
        />
      </div>
      <br />
      <!-- email -->
      <div class="email">
        <label for="e">Email</label>
        <input id="e" type="email" name="email" required placeholder="email" />
      </div>
      <br />
      <!-- submit -->
      <div class="submit">
        <input type="submit" />
        <input type="reset" />
      </div>
      <br />
    </form>
    <hr />
    <!-- footer -->
    <footer>
      <p>© 2026 Bookify. All rights reserved.</p>
    </footer>
  </body>
</html>
