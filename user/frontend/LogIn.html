<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Library Store</title>
        <meta name="description" content="This is my library Store" />
    </head>
    <body>
        <nav>
            <a href="index.html">Home</a> |
            <a href="books.html">Books</a> |
            <a href="search.html">Search</a> |
            <a href="favorites.html">Favorites</a> |
            <a href="borrowed.html">Borrowed</a>
        </nav>
        <h1>Log In</h1>
        <form action="books.html" method="post">
            <!-- username -->
            <div class = "username">
                <label for = "us" >username</label>
                <input id = "us" type="text" name="username" required placeholder="username" autofocus>
            </div>
            <br>
            <!-- password -->
            <div class = "password">
                <Label for = "pw">password</Label>
                <input id = "pw" type="password" name="password" required placeholder="password">
            </div>
            <br>
            <!-- confirm password -->
            <div class = "confirm password">
                <Label for = "cpw">confirm password</Label>
                <input id = "cpw" type="password" name="confirm password" required placeholder="confirm password">
            </div>
            <br>
            <!-- submit -->
            <div class = "submit">
                <input type="submit">
                <input type="reset">
            </div>
            <br>
        </form>
        <hr>
        <footer>
            <p>© 2026 Online Library. All rights reserved.</p>
        </footer>
    </body>
</html>
