{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookify - Home</title>
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body>
    <header>
        <nav>
            <table>
                <tr>
                    <td class="nav-cell nav-cell--active"><a class="nav-link nav-link--active" title="Home Page" href="/">Home</a></td>
                    <td class="nav-cell"><a class="nav-link" title="Available Books" href="/books/">Books</a></td>
                    <td class="nav-cell"><a class="nav-link" title="Search" href="/search/">Search</a></td>
                    <td class="nav-cell"><a class="nav-link" title="Borrowed books" href="/borrowed/">Borrowed</a></td>
                    <td class="nav-cell"><a class="nav-link" title="Log Out" href="/login/">Logout</a></td>
                </tr>
            </table>
        </nav>
        <div id="user-info" style="text-align: center; padding: 10px; background-color: #f9fafb;"></div>
    </header>

    <main class="content-card text-center">
        <h1 class="page-title">Bookify</h1>
        <h2 class="page-subtitle">Welcome to Bookify</h2>
        
        <p class="page-description">
            Your online library for discovering amazing books.<br>
            Find the best books for learning, reading, and inspiration.
        </p>

        <hr class="divider">

        <div style="margin-top: 20px;">
            <a href="/signup/" class="btn btn-primary" style="text-decoration: none; display: inline-block; margin-right: 10px;">Sign Up</a>
            <a href="/login/" class="btn btn-secondary" style="text-decoration: none; display: inline-block;">Login</a>
        </div>
    </main>

    <footer>
      <p>© 2026 Bookify. All rights reserved.</p>
    </footer>

    <script src="{% static 'js/user.js' %}"></script>
</body>
</html>
