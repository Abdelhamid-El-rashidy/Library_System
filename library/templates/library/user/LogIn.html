{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bookify - Log In</title>
    <meta name="description" content="Log in to your Bookify account" />
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
  </head>
  <body>
    <header>
      <nav>
        <table>
          <tr>
            <td class="nav-cell"><a class="nav-link" title="Home Page" href="/">Home</a></td>
            <td class="nav-cell"><a class="nav-link" title="Available Books" href="/books/">Books</a></td>
            <td class="nav-cell"><a class="nav-link" title="Search" href="/search/">Search</a></td>
            <td class="nav-cell"><a class="nav-link" title="Borrowed books" href="/borrowed/">Borrowed</a></td>
            <td class="nav-cell nav-cell--active"><a class="nav-link nav-link--active" title="Sign Up" href="/signup/">Sign Up</a></td>
          </tr>
        </table>
      </nav>
        <div id="user-info" style="text-align: center; padding: 10px; background-color: #f9fafb;"></div>
    </header>

    <main class="content-card">
      <h1 class="page-title">Bookify</h1>
      <h2 class="page-subtitle">Account Login</h2>
      <p class="page-description">Enter your credentials below to access your library account.</p>
      
      <hr class="divider" />

      <form action="admin-books.html" method="post">
        <span class="form-legend">Login Details</span>

        <div class="form-group">
          <label for="us">User Name <span class="required">*</span></label>
          <input
            id="us"
            type="text"
            name="username"
            required
            placeholder="Enter your username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="pw">Password <span class="required">*</span></label>
          <input
            id="pw"
            type="password"
            name="password"
            required
            placeholder="Enter your password"
          />
        </div>

        <br />

        <div class="submit-actions">
          <button type="submit" class="btn btn-primary">Login</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </main>

    <footer>
      <p>© 2026 Bookify. All rights reserved.</p>
    </footer>
    <script src="{% static 'js/user.js' %}"></script>
  </body>
</html>
