{% load static %}
<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Bookify - Sign Up</title>
  <meta name="description" content="Create a new Bookify account" />
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>

<body>
  <header>
    <nav>
      <table>
        <tr>
          <td class="nav-cell"><a class="nav-link" title="Home Page" href="/">Home</a></td>
          <td class="nav-cell"><a class="nav-link" title="Available Books" href="/books/">Books</a></td>
          <td class="nav-cell"><a class="nav-link" title="Search" href="/search/">Search</a></td>
          <td class="nav-cell"><a class="nav-link" title="Borrowed books" href="/borrowed/">Borrowed</a></td>
          <td class="nav-cell nav-cell--active"><a class="nav-link nav-link--active" title="Log In"
              href="/login/">Log In</a></td>
        </tr>
      </table>
    </nav>
        <div id="user-info" style="text-align: center; padding: 10px; background-color: #f9fafb;"></div>
  </header>

  <main class="content-card">
    <h1 class="page-title">Bookify</h1>
    <h2 class="page-subtitle">Create Account</h2>
    <p class="page-description">Join our library community to start borrowing and managing your favorite books.</p>

    <hr class="divider" />

    <form action="books.html" method="post">
      <span class="form-legend">Sign Up Details</span>

      <div class="form-group">
        <label for="us">User Name <span class="required">*</span></label>
        <input id="us" type="text" name="username" required placeholder="Choose a username" autofocus />
      </div>

      <div class="form-group">
        <label for="pw">Password <span class="required">*</span></label>
        <input id="pw" type="password" name="password" required placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label for="cpw">Confirm Password <span class="required">*</span></label>
        <input id="cpw" type="password" name="confirm password" required placeholder="Repeat your password" />
      </div>

      <div class="form-group">
        <label for="e">Email <span class="required">*</span></label>
        <input id="e" type="email" name="email" required placeholder="email@example.com" />
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 24px;">
        <input id="ia" type="checkbox" name="ia" style="width: auto; margin-bottom: 0;" />
        <label for="ia" style="margin-bottom: 0;">Register as Administrator</label>
      </div>

      <div class="submit-actions">
        <button type="submit" class="btn btn-primary">Create Account</button>
        <button type="reset" class="btn btn-secondary">Clear Form</button>
      </div>
    </form>
  </main>

  <footer>
    <p>© 2026 Bookify. All rights reserved.</p>
  </footer>
  <script src="{% static 'js/user.js' %}"></script>
</body>

</html>
