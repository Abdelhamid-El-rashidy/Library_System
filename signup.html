<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bookify - Sign Up</title>
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/utilities.css" />
    </head>
    <body class="standalone-page">
        <div class="content-card">
            <div class="standalone-logo"><span>Bookify</span></div>
            <h2 class="page-subtitle">Create Account</h2>
            <p class="page-description">Join our library community.</p>
            <hr class="divider" />
            <form id="signupForm">
                <div class="form-group">
                    <label for="us">Username <span class="required">*</span></label>
                    <input id="us" type="text" name="username" required placeholder="Choose a username" autofocus />
                </div>
                <div class="form-group">
                    <label for="pw">Password <span class="required">*</span></label>
                    <input id="pw" type="password" name="password" required placeholder="Create a password" />
                </div>
                <div class="form-group">
                    <label for="cpw">Confirm Password <span class="required">*</span></label>
                    <input id="cpw" type="password" name="confirm password" required placeholder="Repeat your password" />
                </div>
                <div class="form-group">
                    <label for="e">Email <span class="required">*</span></label>
                    <input id="e" type="email" name="email" required placeholder="email@example.com" />
                </div>
                <div class="checkbox-group">
                    <input id="is_admin" type="checkbox" name="is_admin" />
                    <label for="is_admin">Register as Admin</label>
                </div>
                <div class="submit-actions">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </div>
            </form>
            <p style="text-align: center; margin: 20px 0 0; font-size: 13px; color: var(--text3)">
                Already have an account? <a href="login.html" style="color: var(--accent-dark); font-weight: 600; text-decoration: none">Sign In</a>
            </p>
        </div>
        <script src="js/shared.js"></script>
        <script src="js/user-auth.js"></script>
    </body>
</html>
